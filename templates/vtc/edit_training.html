{% extends 'common/base.html' %}
{% load static %}

{% block content %}

<style>

body{
    background:#eef3f9;
    font-family:"Segoe UI",sans-serif;
}

/* Layout */
.page-layout{
    display:flex;
    gap:20px;
}

/* Sidebar */
.sidebar-container{
    width:25%;
}

/* Content */
.content-container{
    width:75%;
}

/* Form Card */
.form-card{
    background:linear-gradient(135deg,#ffffff,#f6f9ff);
    padding:35px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

/* Title */
.page-title{
    color:#0d6efd;
    font-weight:600;
    margin-bottom:25px;
}

/* Label */
.form-label{
    display:block;
    font-weight:600;
    color:#444;
    margin-bottom:6px;
}

/* Inputs */
.form-control{
    width:100%;
    border-radius:8px;
    padding:10px;
    border:1px solid #d6dce5;
}

/* Focus */
.form-control:focus{
    border-color:#0d6efd;
    outline:none;
    box-shadow:0 0 5px rgba(13,110,253,.2);
}

/* Buttons */
.btn-update{
    background:#0d6efd;
    border:none;
    padding:10px 25px;
    border-radius:8px;
    color:white;
    margin-right:10px;
}

.btn-update:hover{
    background:#0b5ed7;
}

.btn-cancel{
    background:#6c757d;
    color:white;
    padding:10px 25px;
    border-radius:8px;
    text-decoration:none;
}

.btn-cancel:hover{
    background:#5a6268;
}

</style>


<div class="container-fluid mt-4">

<div class="page-layout">

<!-- Sidebar -->
<div class="sidebar-container">
    {% include 'vtc/sidebar.html' %}
</div>


<!-- Main Content -->
<div class="content-container">

<div class="form-card">

<h2 class="page-title">
Edit Training Schedule
</h2>

{% include 'common/message.html' %}

<form method="post">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">From Date</label>
<input type="date"
       name="from_date"
       class="form-control"
       value="{{ training.from_date|date:'Y-m-d' }}"
       required>
</div>

<div class="mb-3">
<label class="form-label">To Date</label>
<input type="date"
       name="to_date"
       class="form-control"
       value="{{ training.to_date|date:'Y-m-d' }}"
       required>
</div>

<button type="submit" class="btn-update">
Update
</button>

<a href="{% url 'vtc:schedule_training' training.worker.id %}" class="btn-cancel">
Cancel
</a>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
