{% extends 'common/base.html' %}
{% load static %}

{% block content %}

<style>
.dashboard-wrapper{display:flex;gap:25px;width:100%;}
.dashboard-sidebar{width:25%;flex-shrink:0;}
.dashboard-content{width:75%;}
.dashboard-card{background:#fff;border-radius:10px;padding:30px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.dashboard-title{color:#004B87;font-weight:600;font-size:26px;}

.tiles-row{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.dashboard-tile{
    cursor:pointer;
    transition:0.3s;
    border:none;
    border-radius:12px;
    color:white;
}

.dashboard-tile .card-body{padding:35px 10px;}
.dashboard-tile h2{font-size:36px;font-weight:700;}
.dashboard-tile p{margin-top:10px;font-size:15px;}

.tile-trained{background:linear-gradient(135deg,#007bff,#0047ab);}
.tile-under-training{background:linear-gradient(135deg,#28a745,#1e7e34);}
.tile-total-trainings{background:linear-gradient(135deg,#ffc107,#d39e00);color:black;}

.dashboard-tile:hover{transform:scale(1.06);}
.dashboard-tile.active-tile{
    transform:scale(1.06);
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

#areaChart{height:350px !important;}
</style>


<div class="container-fluid mt-4">

<div class="dashboard-wrapper">

<!-- SIDEBAR -->
<div class="dashboard-sidebar">
    {% include 'cil/sidebar.html' %}
</div>

<!-- CONTENT -->
<div class="dashboard-content">

<div class="dashboard-card">

<h2 class="text-center mb-4 dashboard-title">
Contractual Worker Training Dashboard
</h2>

<!-- 🔙 BACK BUTTON -->
{% if level == "area" %}
<a href="{% url 'cil:dashboard' %}" class="btn btn-secondary mb-3">
    ← Back to Subsidiaries
</a>
{% endif %}

<!-- TILES -->
<div class="tiles-row">

<div class="dashboard-tile card text-center tile-trained active-tile" data-type="trained">
    <div class="card-body">
        <h2 id="trainedTotal"></h2>
        <p>Workers Trained</p>
    </div>
</div>

<div class="dashboard-tile card text-center tile-under-training" data-type="under_training">
    <div class="card-body">
        <h2 id="underTrainingTotal"></h2>
        <p>Workers Under Training</p>
    </div>
</div>

<div class="dashboard-tile card text-center tile-total-trainings" data-type="total">
    <div class="card-body">
        <h2 id="totalTrainingTotal"></h2>
        <p>Total Trainings Scheduled</p>
    </div>
</div>

</div>

<!-- CHART -->
<div class="card p-4">
    <canvas id="areaChart"></canvas>
</div>

</div>
</div>
</div>
</div>

<script src="{% static 'chart.umd.js' %}"></script>

<script>

// 🔹 DATA FROM BACKEND
const labels = JSON.parse('{{ labels|escapejs }}');
const trainedCounts = JSON.parse('{{ trained|escapejs }}');
const underTrainingCounts = JSON.parse('{{ under_training|escapejs }}');
const totalCounts = JSON.parse('{{ total|escapejs }}');

const level = "{{ level }}";

let chart=null;

function updateTiles(type){
    const datasetsMap={
        'trained':trainedCounts,
        'under_training':underTrainingCounts,
        'total':totalCounts
    };

    const dataArray=datasetsMap[type];

    document.getElementById('trainedTotal').innerText =
        trainedCounts.reduce((a,b)=>a+b,0);

    document.getElementById('underTrainingTotal').innerText =
        underTrainingCounts.reduce((a,b)=>a+b,0);

    document.getElementById('totalTrainingTotal').innerText =
        totalCounts.reduce((a,b)=>a+b,0);
}

function renderChart(type){

const datasetsMap={
'trained':trainedCounts,
'under_training':underTrainingCounts,
'total':totalCounts
};

const colorsMap={
'trained':'rgba(0,123,255,0.7)',
'under_training':'rgba(40,167,69,0.7)',
'total':'rgba(255,193,7,0.7)'
};

if(chart) chart.destroy();

const ctx=document.getElementById('areaChart').getContext('2d');

chart=new Chart(ctx,{
type:'bar',
data:{
labels:labels,
datasets:[{
data:datasetsMap[type],
backgroundColor:colorsMap[type]
}]
},
options:{
responsive:true,
plugins:{
legend:{display:false},
title:{
display:true,
text: (level === "subsidiary" ? "SUBSIDIARY WISE" : "AREA WISE")
}
},
onClick: function(evt, elements){
    if(elements.length > 0){
        const index = elements[0].index;

        // 🔥 Drill-down only from subsidiary level
        if(level === "subsidiary"){
            const selected = labels[index];
            window.location.href = "?subsidiary=" + selected;
        }
    }
},
scales:{
y:{
beginAtZero:true,
ticks:{precision:0}
}
}
}
});

document.querySelectorAll('.dashboard-tile').forEach(tile=>{
tile.classList.remove('active-tile');
});

document.querySelector(`[data-type="${type}"]`).classList.add('active-tile');

updateTiles(type);
}

// 🔥 INITIAL LOAD
renderChart('trained');

// 🔥 TILE CLICK
document.querySelectorAll('.dashboard-tile').forEach(tile=>{
tile.addEventListener('click',()=>{
renderChart(tile.dataset.type);
});
});

</script>

{% endblock %}
